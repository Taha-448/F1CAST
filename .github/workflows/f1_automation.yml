name: F1CAST Automated Pipeline

on:
  schedule:
    # Runs daily at 04:00 UTC (9:00 AM PKT) to check for race data & predictions
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows manual trigger anytime via GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run F1CAST Pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          python scripts/run_pipeline.py

      - name: Commit and Push Updated Data & State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated pipeline state & predictions update [skip ci]"
          file_pattern: 'state.json data/ predictions/ comparisons/'
